schemaVersion: 1.0.1
name: diamond-app
version: 0.1.0
registry: "localhost:5000"

mixins:
  - exec

dependencies:
  requires:
    - name: mysql
      bundle:
        reference: localhost:5000/mysql:v0.1.4

install:
  - exec:
      command: echo
      arguments:
        - "installed diamond-app"

uninstall:
  - exec:
      command: echo
      arguments:
        - "uninstalled diamond-app"
