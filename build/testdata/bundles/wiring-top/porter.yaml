schemaVersion: 1.1.0
name: wiring-top
version: 0.1.0
registry: "localhost:5000"

mixins:
  - exec

dependencies:
  requires:
    - name: infra
      bundle:
        reference: localhost:5000/wiring-infra:v0.1.0
      sharing:
        mode: true
        group:
          name: wiring-top
    - name: app
      bundle:
        reference: localhost:5000/wiring-app:v0.1.0
      sharing:
        mode: true
        group:
          name: wiring-top
      parameters:
        connstr: ${bundle.dependencies.infra.outputs.ip}

install:
  - exec:
      command: echo
      arguments:
        - "installed wiring-top"

uninstall:
  - exec:
      command: echo
      arguments:
        - "uninstalled wiring-top"
