schemaVersion: 1.0.1
name: diamond-top
version: 0.1.0
registry: "localhost:5000"

mixins:
  - exec

dependencies:
  requires:
    - name: diamond-app-a
      bundle:
        reference: localhost:5000/diamond-app-a:v0.1.0
    - name: diamond-app-b
      bundle:
        reference: localhost:5000/diamond-app-b:v0.1.0

install:
  - exec:
      command: echo
      arguments:
        - "installed diamond-top"

uninstall:
  - exec:
      command: echo
      arguments:
        - "uninstalled diamond-top"
