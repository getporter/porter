schemaVersion: 1.1.0
name: wordpress-interface-missing
version: 0.1.4
registry: "localhost:5000"

mixins:
  - exec
  - helm3:
      repositories:
        bitnami:
          url: "https://charts.bitnami.com/bitnami"

dependencies:
  requires:
    - name: mysql
      bundle:
        reference: localhost:5000/mysql:v0.1.4
        interface:
          document:
            outputs:
              # mysql never produces this output -- any existing mysql
              # installation fails to satisfy this interface, so the
              # dependency must always be pulled instead of reused.
              - name: mysql-connstr
      sharing:
        mode: true
        group:
          name: myapp
      parameters:
        database-name: wordpress
        mysql-user: wordpress
        namespace: wordpress

parameters:
- name: wordpress-name
  type: string
  default: porter-ci-wordpress
  env: WORDPRESS_NAME
- name: wordpress-password
  type: string
  sensitive: true
  applyTo:
    - install
    - upgrade
- name: namespace
  type: string
  default: 'wordpress'

install:
  - exec:
      command: ./helpers.sh
      arguments:
        - install

upgrade:
  - exec:
      command: ./helpers.sh
      arguments:
        - install

ping:
  - exec:
      description: "Ping"
      command: ./helpers.sh
      arguments:
        - ping

uninstall:
  - exec:
      command: echo
      arguments:
        - uninstall wordpress

outputs:
  - name: wordpress-password
    description: "The Wordpress installation password"
    type: string
    default: "default-password"
    applyTo:
      - "install"
      - "upgrade"
    sensitive: true
    path: /cnab/app/outputs/wordpress-password
