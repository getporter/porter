schemaVersion: 1.1.0
name: wiring-infra
version: 0.1.0
registry: "localhost:5000"

mixins:
  - exec

install:
  - exec:
      command: echo
      arguments:
        - "installed wiring-infra"

uninstall:
  - exec:
      command: echo
      arguments:
        - "uninstalled wiring-infra"

outputs:
  - name: ip
    type: string
    default: "10.0.0.1"
