schemaVersion: 1.3.0
name: bundle-with-file-sources
version: 0.1.0
registry: localhost:5000

mixins:
  - exec

files:
  - url: https://placeholder.example.com/file.txt
    destination: downloaded-file.txt

install:
  - exec:
      description: "Install"
      command: echo
      arguments:
        - installed

upgrade:
  - exec:
      description: "Upgrade"
      command: echo
      arguments:
        - upgraded

uninstall:
  - exec:
      description: "Uninstall"
      command: echo
      arguments:
        - uninstalled
